[agent]
  interval = "${INTERVAL}"
  flush_interval = "${FLUSH_INTERVAL}"

# ==============================
# MQTT INPUT
# ==============================
[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["mini-dc/+/+/+"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "mqtt"

    # ==========================
    # TIMESTAMP
    # ==========================
    timestamp_path = "ts"
    timestamp_format = "unix"

    # ==========================
    # FIELD (metric → field)
    # ==========================
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

    # ==========================
    # TAGS (จาก JSON)
    # ==========================
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "metric"
      rename = "_field"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "unit"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "source"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "quality"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "tags.zone"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "tags.device"

# ==============================
# PROCESSOR: FIX FIELD NAME
# ==============================
[[processors.converter]]
  namepass = ["mqtt"]

  [processors.converter.tags]
    tag = ["_field"]

# ==============================
# OUTPUT → ENERGY
# ==============================
[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${BUCKET_ENERGY}"

  [outputs.influxdb_v2.tagpass]
    topic = ["mini-dc/*/energy/*"]

# ==============================
# OUTPUT → NETWORK
# ==============================
[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${BUCKET_NETWORK}"

  [outputs.influxdb_v2.tagpass]
    topic = ["mini-dc/*/network/*"]